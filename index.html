<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIME TRACKER // SEASON 2025</title>
  <link rel="stylesheet" href="./css/style.css">

  <!-- Firebase SDK -->
  <script type="text/javascript" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script type="text/javascript" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">⬡</div>
        <div>
          <div class="logo-text">ANIME.TX</div>
          <div class="logo-sub">TRACKER // 2026</div>
        </div>
      </a>

      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="goToCurrentWeek()">HOY</button>
        <button class="btn btn-ghost btn-sm" onclick="resetAndReload()" title="Recargar datos de Firebase">↺</button>
        <button class="btn btn-ghost btn-sm" onclick="migrateDataToFirebase()" title="Migrar datos locales a Firebase">↑</button>
        <button class="btn btn-neon" onclick="openAddModal()">+ AGREGAR</button>
      </div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">En seguimiento</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-today">0</span>
        <span class="stat-label">Salen hoy</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-week">0</span>
        <span class="stat-label">Esta semana</span>
      </div>
    </div>

    <!-- WEEK NAVIGATION -->
    <div class="week-nav">
      <button class="week-nav-btn" id="btn-prev" onclick="prevWeek()" title="Semana anterior">‹</button>

      <div class="week-info">
        <div class="week-label" id="week-label">SEMANA ACTUAL</div>
        <div class="week-dates" id="week-dates">—</div>
      </div>

      <button class="week-nav-btn" id="btn-next" onclick="nextWeek()" title="Semana siguiente">›</button>
    </div>

    <!-- CALENDAR GRID -->
    <div class="calendar-grid" id="calendar-grid">
      <!-- Rendered by JS -->
    </div>

    <!-- ANIME LIST -->
    <div class="section-header">
      <span class="section-title">// LISTA DE ANIMES</span>
      <button class="btn btn-neon btn-sm" onclick="openAddModal()">+ NUEVO</button>
    </div>

    <div class="anime-list" id="anime-list">
      <!-- Rendered by JS -->
    </div>

  </main>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">NUEVO ANIME</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <form id="form-anime">
        <div class="form-grid">

          <div class="form-group full">
            <label for="field-title">TÍTULO</label>
            <input type="text" id="field-title" placeholder="Ej: Attack on Titan" required>
          </div>

          <div class="form-group">
            <label for="field-premiere">FECHA DE ESTRENO</label>
            <input type="date" id="field-premiere" required>
          </div>

          <div class="form-group">
            <label for="field-total-ep">TOTAL DE EPISODIOS</label>
            <input type="number" id="field-total-ep" min="1" max="200" value="12">
          </div>

          <div class="form-group">
            <label for="field-day">DÍA DE EMISIÓN</label>
            <select id="field-day">
              <option value="monday">Lunes</option>
              <option value="tuesday">Martes</option>
              <option value="wednesday">Miércoles</option>
              <option value="thursday">Jueves</option>
              <option value="friday">Viernes</option>
              <option value="saturday">Sábado</option>
              <option value="sunday">Domingo</option>
            </select>
          </div>

          <div class="form-group">
            <label for="field-time">HORA DE EMISIÓN</label>
            <input type="time" id="field-time" placeholder="22:30">
          </div>

          <div class="form-group">
            <label for="field-platform">PLATAFORMA</label>
            <input type="text" id="field-platform" placeholder="Crunchyroll, Netflix...">
          </div>

          <div class="form-group">
            <label for="field-color">COLOR NEON</label>
            <input type="color" id="field-color" value="#00fff5">
          </div>

          <div class="form-group full">
            <label for="field-cover">URL DE PORTADA (opcional)</label>
            <input type="url" id="field-cover" placeholder="https://...">
          </div>

          <div class="form-group full">
            <label for="field-cover-file">SUBIR IMAGEN (opcional)</label>
            <input type="file" id="field-cover-file" accept="image/*">
          </div>

        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">CANCELAR</button>
          <button type="submit" class="btn btn-solid">GUARDAR</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── TOASTS ── -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ── SCRIPTS ── -->
  <script src="./js/app.js"></script>

</body>
</html>
